# -----------------------------------------------------------------------------
# Active portfolio definition.
#
# 30 US large/mid-cap names mapped to their GICS sector, with TARGET weights.
# Weights drift with prices between rebalances and reset to these targets on the
# rebalance schedule. Target weights sum to 1.0 (see test_portfolio.py).
#
# GICS sector names MUST match the keys in configs/benchmark.yml exactly.
# -----------------------------------------------------------------------------
name: "Concentrated US Large-Cap Growth Tilt"

# Analysis window (month-end returns). end is auto-capped to the latest month
# for which BOTH prices and Ken French factors are available.
start: "2015-01-01"
end: "2025-12-31"

# Rebalance frequency: Q (calendar-quarter start), M (monthly), A (annual), none.
rebalance: "Q"

holdings:
  # Information Technology (target 25%)
  - {ticker: AAPL, sector: "Information Technology", target_weight: 0.07}
  - {ticker: MSFT, sector: "Information Technology", target_weight: 0.07}
  - {ticker: NVDA, sector: "Information Technology", target_weight: 0.06}
  - {ticker: AVGO, sector: "Information Technology", target_weight: 0.03}
  - {ticker: CRM,  sector: "Information Technology", target_weight: 0.02}

  # Communication Services (target 12%)
